<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boas Vindas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e, #16213e);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #a78bfa;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    h1 span {
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.15rem;
      color: #94a3b8;
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.4);
      color: #a78bfa;
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">NOCode</div>
    <h1>Bem-vindo(a) à<br><span>nossa comunidade</span></h1>
    <p>Você deu o primeiro passo para transformar suas ideias em realidade — sem escrever uma linha de código.</p>
    <div class="badge">Sua jornada começa agora</div>
  </div>
</body>
</html>
